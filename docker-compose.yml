services:
  kageclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: kageclaw:latest
    container_name: kageclaw
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Asia/Shanghai
      KAGECLAW_CORS_ORIGINS: "*"
    volumes:
      - ./.kageclaw:/root/.kageclaw
      - ./.kageclaw/workspace:/workspace