services:
  kageclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: kageclaw:latest
    container_name: kageclaw
    restart: unless-stopped
    network_mode: host
    environment:
      TZ: Asia/Shanghai
      KAGECLAW_CORS_ORIGINS: "*"

      HTTP_PROXY: http://127.0.0.1:7890
      HTTPS_PROXY: http://127.0.0.1:7890
      ALL_PROXY: socks5h://127.0.0.1:7890

      http_proxy: http://127.0.0.1:7890
      https_proxy: http://127.0.0.1:7890
      all_proxy: socks5h://127.0.0.1:7890

      NO_PROXY: localhost,127.0.0.1,0.0.0.0
      no_proxy: localhost,127.0.0.1,0.0.0.0
    volumes:
      - ./.kageclaw:/root/.kageclaw
      - ./.kageclaw/workspace:/workspace